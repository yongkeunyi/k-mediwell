<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공존감 플래시카드 — 자아 해체에서 전체성으로</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #EEF7EE;
      color: #1A3A2A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background-color: #2D7A4F;
      color: #fff;
      text-align: center;
      padding: 28px 20px 20px;
    }
    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    header p {
      font-family: 'Lora', serif;
      font-size: 15px;
      opacity: 0.85;
    }

    /* ── Category tabs ── */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 20px 16px 0;
      max-width: 860px;
      width: 100%;
    }
    .tab-btn {
      background: #fff;
      border: 2px solid #2D7A4F;
      color: #2D7A4F;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn.active, .tab-btn:hover {
      background: #2D7A4F;
      color: #fff;
    }

    /* ── Progress ── */
    .progress-bar-wrap {
      width: 100%;
      max-width: 600px;
      background: #D6EDD9;
      border-radius: 8px;
      height: 8px;
      margin: 18px auto 0;
    }
    .progress-bar {
      height: 8px;
      background: linear-gradient(90deg, #2D7A4F, #C4622D);
      border-radius: 8px;
      transition: width 0.4s;
    }
    .progress-text {
      text-align: center;
      font-size: 13px;
      color: #4A7A5A;
      margin-top: 6px;
    }

    /* ── Card area ── */
    .card-area {
      perspective: 1200px;
      margin: 28px auto 0;
      width: 100%;
      max-width: 600px;
      padding: 0 16px;
    }

    .card {
      position: relative;
      width: 100%;
      min-height: 320px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%;
      min-height: 320px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 36px 32px;
      text-align: center;
    }

    /* Front */
    .card-front {
      background: #fff;
      border: 2px solid #B8DFC0;
      box-shadow: 0 6px 24px rgba(45, 122, 79, 0.12);
    }
    .card-front .category-badge {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: #D6EDD9;
      color: #2D7A4F;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 12px;
      white-space: nowrap;
    }
    .card-front .question {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 600;
      color: #1A3A2A;
      line-height: 1.55;
    }
    .card-front .hint {
      margin-top: 18px;
      font-size: 13px;
      color: #7AAA8A;
    }

    /* Back */
    .card-back {
      background: linear-gradient(145deg, #2D7A4F 0%, #1A5C38 100%);
      transform: rotateY(180deg);
      box-shadow: 0 6px 24px rgba(45, 122, 79, 0.25);
    }
    .card-back .answer-label {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 12px;
      white-space: nowrap;
    }
    .card-back .answer {
      font-family: 'Lora', serif;
      font-size: 19px;
      color: #fff;
      line-height: 1.65;
    }
    .card-back .answer strong {
      color: #FFD580;
      font-family: 'Space Grotesk', sans-serif;
    }
    .card-back .keyword {
      margin-top: 20px;
      background: rgba(255,255,255,0.15);
      color: #D6EDD9;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 20px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 24px auto 0;
      max-width: 600px;
      padding: 0 16px;
    }
    .btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-prev { background: #D6EDD9; color: #2D7A4F; }
    .btn-flip { background: #2D7A4F; color: #fff; }
    .btn-next { background: #C4622D; color: #fff; }
    .btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Card counter ── */
    .card-counter {
      text-align: center;
      font-size: 14px;
      color: #4A7A5A;
      margin-top: 12px;
    }

    /* ── All cards list ── */
    .all-cards-section {
      max-width: 860px;
      width: 100%;
      padding: 32px 16px 48px;
      margin: 0 auto;
    }
    .all-cards-section h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1A3A2A;
      margin-bottom: 16px;
      border-left: 4px solid #2D7A4F;
      padding-left: 12px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    .mini-card {
      background: #fff;
      border: 1.5px solid #B8DFC0;
      border-radius: 12px;
      padding: 16px 18px;
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .mini-card:hover { box-shadow: 0 4px 16px rgba(45,122,79,0.15); border-color: #2D7A4F; }
    .mini-card .mc-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #2D7A4F;
      margin-bottom: 8px;
    }
    .mini-card .mc-q {
      font-family: 'Lora', serif;
      font-size: 15px;
      color: #1A3A2A;
      line-height: 1.5;
    }
    .mini-card .mc-a {
      display: none;
      margin-top: 10px;
      font-size: 14px;
      color: #2A4A35;
      line-height: 1.5;
      border-top: 1px solid #D6EDD9;
      padding-top: 10px;
    }
    .mini-card.open .mc-a { display: block; }
    .mini-card.open { border-color: #C4622D; }

    footer {
      text-align: center;
      font-size: 12px;
      color: #7AAA8A;
      padding: 16px;
    }
  </style>
</head>
<body>

<header>
  <h1>공존감 플래시카드</h1>
  <p>자아 해체에서 전체성으로 — 뇌과학·불교심리학·공존감의 핵심 개념</p>
</header>

<!-- Category Tabs -->
<div class="tabs" id="tabs"></div>

<!-- Progress -->
<div style="max-width:600px;width:100%;padding:0 16px;margin:0 auto;">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="progress-text" id="progressText"></div>
</div>

<!-- Flip Card -->
<div class="card-area">
  <div class="card" id="mainCard" onclick="flipCard()">
    <div class="card-face card-front">
      <div class="category-badge" id="frontBadge"></div>
      <div class="question" id="frontQ"></div>
      <div class="hint">카드를 클릭하면 답이 나옵니다 ↩</div>
    </div>
    <div class="card-face card-back">
      <div class="answer-label">Answer</div>
      <div class="answer" id="backA"></div>
      <div class="keyword" id="backKw"></div>
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn btn-prev" id="btnPrev" onclick="navigate(-1)">← 이전</button>
  <button class="btn btn-flip" onclick="flipCard()">뒤집기</button>
  <button class="btn btn-next" id="btnNext" onclick="navigate(1)">다음 →</button>
</div>
<div class="card-counter" id="cardCounter"></div>

<!-- All cards grid -->
<div class="all-cards-section">
  <h2>전체 카드 목록 (클릭하여 답 확인)</h2>
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<footer>© 2026 공존감 연구 · 강태원 | #자아해체 #공존감 #뇌과학 #불교심리학 #FAWA수행</footer>

    cat: "통합 결론",
    q: "향후 연구의 핵심 방향은?",
    a: "① fMRI 종단 연구로 3단계 활성 패턴 추적 ② 바이오피드백 기반 안정 유도 프로토콜 개발 ③ <strong>공존감 실천 아카이브</strong> 구축 및 neurobrain fwaves 연구.",
    kw: "#향후연구 #fMRI #바이오피드백"
  },
];

// ── State
let currentIndex = 0;
let currentCat = "전체";
let filtered = [...ALL_CARDS];

function getFiltered() {
  return currentCat === "전체" ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === currentCat);
}

// ── Tabs
const cats = ["전체", ...new Set(ALL_CARDS.map(c => c.cat))];
const tabsEl = document.getElementById("tabs");
cats.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "tab-btn" + (cat === "전체" ? " active" : "");
  btn.textContent = cat;
  btn.onclick = () => {
    currentCat = cat;
    currentIndex = 0;
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    filtered = getFiltered();
    renderCard();
    renderGrid();
  };
  tabsEl.appendChild(btn);
});

// ── Render main card
function renderCard() {
  filtered = getFiltered();
  const card = filtered[currentIndex];
  document.getElementById("frontBadge").textContent = card.cat;
  document.getElementById("frontQ").textContent = card.q;
  document.getElementById("backA").innerHTML = card.a;
  document.getElementById("backKw").textContent = card.kw;
  document.getElementById("mainCard").classList.remove("flipped");
  document.getElementById("btnPrev").disabled = currentIndex === 0;
  document.getElementById("btnNext").disabled = currentIndex === filtered.length - 1;
  document.getElementById("cardCounter").textContent = `${currentIndex + 1} / ${filtered.length}`;
  const pct = ((currentIndex + 1) / filtered.length) * 100;
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressText").textContent = `진행률 ${Math.round(pct)}%`;
}

function flipCard() {
  document.getElementById("mainCard").classList.toggle("flipped");
}

function navigate(dir) {
  filtered = getFiltered();
  currentIndex = Math.max(0, Math.min(filtered.length - 1, currentIndex + dir));
  renderCard();
}

// ── Render grid
function renderGrid() {
  filtered = getFiltered();
  const grid = document.getElementById("cardsGrid");
  grid.innerHTML = "";
  filtered.forEach((card, i) => {
    const div = document.createElement("div");
    div.className = "mini-card";
    div.innerHTML = `<div class="mc-badge">${card.cat}</div><div class="mc-q">${card.q}</div><div class="mc-a">${card.a}<br><span style="font-size:12px;color:#7AAA8A;">${card.kw}</span></div>`;
    div.onclick = () => {
      div.classList.toggle("open");
    };
    grid.appendChild(div);
  });
}

// ── Keyboard navigation
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowDown") navigate(1);
  else if (e.key === "ArrowLeft" || e.key === "ArrowUp") navigate(-1);
  else if (e.key === " " || e.key === "Enter") { e.preventDefault(); flipCard(); }
});

// ── Init
filtered = getFiltered();
renderCard();
renderGrid();
</script>
</body>
</html>
